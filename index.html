<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        /* Modern Reset & Mobile-First Foundation */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            color: #262626;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            max-width: 935px;
            margin: 30px auto;
        }

        /* Container Layout System */
        .page-container {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
            gap: 32px;
        }

        /* Left Side: Mobile App Preview (Hidden by default on mobile) */
        .preview-section {
            display: none;
            position: relative;
            height: 581px;
            width: 380px;
            background-image: url('https://img.icons8.com/wired/64/000000/iphone.png'); /* Fallback design anchor */
            background-size: cover;
        }

        /* Instagram Mockup Phone Frame Layer */
        .phone-frame {
            position: relative;
            width: 100%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/itshasibulhasan/instagram-login-page-clone/main/images/home-phones.png') no-repeat;
            background-size: 465px;
            background-position: -46px 0;
        }

        .screenshot-container {
            position: absolute;
            top: 27px;
            right: 18px;
            width: 250px;
            height: 538px;
            overflow: hidden;
            border-radius: 4px;
        }

        .screenshot {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            animation: fadeSlideshow 12s infinite ease-in-out;
            background-size: cover;
        }

        /* Self-Cycling App Preview Slide Cycle */
        .screenshot:nth-child(1) {
            background-image: url('https://raw.githubusercontent.com/itshasibulhasan/instagram-login-page-clone/main/images/screenshot1.png');
            animation-delay: 0s;
        }
        .screenshot:nth-child(2) {
            background-image: url('https://raw.githubusercontent.com/itshasibulhasan/instagram-login-page-clone/main/images/screenshot2.png');
            animation-delay: 3s;
        }
        .screenshot:nth-child(3) {
            background-image: url('https://raw.githubusercontent.com/itshasibulhasan/instagram-login-page-clone/main/images/screenshot3.png');
            animation-delay: 6s;
        }
        .screenshot:nth-child(4) {
            background-image: url('https://raw.githubusercontent.com/itshasibulhasan/instagram-login-page-clone/main/images/screenshot4.png');
            animation-delay: 9s;
        }

        @keyframes fadeSlideshow {
            0%, 20% { opacity: 1; }
            25%, 95% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Right Side: Identity Core Forms Stack */
        .auth-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .box-panel {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-box {
            margin-bottom: 30px;
            width: 175px;
            height: 51px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png') no-repeat center;
            background-size: contain;
        }

        /* Interactive Input Fields Engine */
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .login-form input {
            width: 100%;
            padding: 10px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .login-form input:focus {
            border-color: #a8a8a8;
        }

        .btn-submit {
            background-color: #0095f6;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            padding: 7px;
            margin-top: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #1877f2;
        }

        /* Divider Design */
        .separator {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 20px 0;
        }

        .separator .line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .separator .text {
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            padding: 0 18px;
            text-transform: uppercase;
        }

        /* Alternative Auth Options */
        .fb-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }

        /* Sign Up Alternative Form Banner */
        .toggle-box {
            padding: 20px;
            font-size: 14px;
            color: #262626;
        }

        .toggle-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        /* App Store Links Section */
        .app-download {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
        }

        .app-download p {
            font-size: 14px;
        }

        .badges-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .badges-row img {
            height: 40px;
            cursor: pointer;
        }

        /* Sticky Layout Responsive Footer Module */
        footer {
            background-color: #fafafa;
            padding: 24px 20px;
            font-size: 12px;
            color: #8e8e8e;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            max-width: 1000px;
            margin: 0 auto 15px auto;
            list-style: none;
        }

        .footer-links a {
            color: #8e8e8e;
            text-decoration: none;
            transition: opacity 0.15s ease;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-copyright {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        /* ==========================================
           RESPONSIVE VIEWPORT BREAKPOINTS (Desktop First)
           ========================================== */
        @media (min-width: 875px) {
            .page-container {
                grid-template-columns: auto 350px;
                align-items: center;
                justify-content: center;
            }
            .preview-section {
                display: block;
            }
        }

        @media (max-width: 450px) {
            body, .box-panel, .toggle-box {
                background-color: #ffffff;
            }
            .box-panel {
                border: none;
                padding: 20px 10px;
            }
            .toggle-box {
                border: none;
            }
        }
    </style>
</head>
<body>

    <main>
        <div class="page-container">
            <section class="preview-section">
                <div class="phone-frame">
                    <div class="screenshot-container">
                        <div class="screenshot"></div>
                        <div class="screenshot"></div>
                        <div class="screenshot"></div>
                        <div class="screenshot"></div>
                    </div>
                </div>
            </section>

            <section class="auth-section">
                <div class="box-panel">
                    <div class="logo-box" aria-label="Instagram logo title graphic"></div>
                    
                    <form class="login-form" onsubmit="event.preventDefault();">
                        <div class="input-wrapper">
                            <input type="text" placeholder="Phone number, username, or email" required>
                        </div>
                        <div class="input-wrapper">
                            <input type="password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn-submit">Log In</button>
                    </form>

                    <div class="separator">
                        <div class="line"></div>
                        <div class="text">or</div>
                        <div class="line"></div>
                    </div>

                    <button class="fb-login">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="#385185"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
                        Log in with Facebook
                    </button>

                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <div class="box-panel toggle-box">
                    <p>Don't have an account? <a href="#">Sign up</a></p>
                </div>

                <div class="app-download">
                    <p>Get the app.</p>
                    <div class="badges-row">
                        <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Knp.png" alt="Download on the App Store badge">
                        <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Get it on Google Play badge">
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <ul class="footer-links">
            <li><a href="#">Meta</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Jobs</a></li>
            <li><a href="#">Help</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">Privacy</a></li>
            <li><a href="#">Terms</a></li>
            <li><a href="#">Locations</a></li>
            <li><a href="#">Instagram Lite</a></li>
            <li><a href="#">Threads</a></li>
            <li><a href="#">Contact Uploading & Non-Users</a></li>
            <li><a href="#">Meta Verified</a></li>
        </ul>
        <div class="footer-copyright">
            © 2026 Instagram from Meta
        </div>
    </footer>

</body>
</html>
